<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ titre }} professeur</title>
    {% load static %}

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f6fa;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* CONTAINER */
.container {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 270px;
    background-color: #0f1e33;
    color: white;
    padding: 25px 20px;
}

.logo-box {
    text-align: center;
    margin-bottom: 5px;
}

.logo-sidebar {
    width: 120px;
}

.admin-line {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}

.small-avatar {
    width: 35px;
    height: 35px;
    background-color: white;
    border-radius: 50%;
}

.sidebar hr {
    border: 1px solid white;
    margin: 25px 0;
}

.menu-title {
    font-weight: bold;
    margin-bottom: 15px;
    font-size: 14px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 7px 0;
    font-size: 14px;
}

.sidebar a.active {
    text-decoration: underline;
}

.sidebar a:hover {
    text-decoration: underline;
}

.logout {
    font-weight: bold;
}
        .content {
            flex: 1;
            padding: 40px;
            background: white;
        }

        h1 {
            margin-bottom: 30px;
            color: #0f1e33;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #0f1e33;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            background-color: #fff;
            transition: border 0.2s ease;
        }

        /* ERREUR : seulement bordure rouge */
        .form-group input.error,
        .form-group select.error {
            border: 2px solid #dc3545;
            background-color: #ffffff;
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-submit {
            background: #0f1e33;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            text-align: center;
            flex: 1;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

    </style>
</head>

<body>

<div class="container">
    <aside class="sidebar">
            <div class="logo-box">
                <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo-sidebar">
            </div>

            <div class="admin-line">
                <div class="small-avatar"></div>
                <span>{{ request.user.username }}</span>
            </div>

            <hr>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <hr>

            <p class="menu-title">GESTION</p>
            <a href="{% url 'professeurs' %}">Gestion des professeurs</a>
            <a href="{% url 'groupes' %}">Gestion des groupes</a>
            <a href="{% url 'salles' %}" class="active">Gestion des salles</a>
            <hr>
            <a href="{% url 'seances' %}">Gestion des séances</a>
            <hr>

            <p class="menu-title">les séances réserver</p>
            <a href="{% url 'emploi_salle' %}">Par salle</a>
            <a href="{% url 'emploi_professeur' %}">Par professeur</a>
            <a href="{% url 'emploi_groupe' %}">Par groupe</a>
            <a href="{% url 'emploi_today' %}">Pour d'aujourd'hui</a>            
            <hr>

            <a href="{% url 'logout' %}" class="logout">Déconnexion</a>
        </aside>

<main class="content">
    <h1>{{ titre }} un professeur</h1>

    <div class="form-container">
        <form method="post" id="professeurForm">
            {% csrf_token %}

            <!-- NOM -->
            <div class="form-group">
                <label>Nom *</label>
                <input type="text" name="nom" id="id_nom" value="{{ form.nom.value|default:'' }}">
                <div class="error-message" id="nom_error"></div>
            </div>

            <!-- PRENOM -->
            <div class="form-group">
                <label>Prénom *</label>
                <input type="text" name="prenom" id="id_prenom" value="{{ form.prenom.value|default:'' }}">
                <div class="error-message" id="prenom_error"></div>
            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" id="id_email" value="{{ form.email.value|default:'' }}">
                <div class="error-message" id="email_error"></div>
            </div>

            <!-- TELEPHONE -->
            <div class="form-group">
                <label>Téléphone *</label>
                <input type="text" name="telephone" id="id_telephone" value="{{ form.telephone.value|default:'' }}">
                <div class="error-message" id="telephone_error"></div>
            </div>

            <!-- MATIERE -->
            <div class="form-group">
                <label>Matière *</label>
                <select name="matiere" id="id_matiere">
                    <option value="">Choisir une matière</option>
                    {% for matiere in matieres %}
                        <option value="{{ matiere.id }}"
                            {% if form.matiere.value == matiere.id %}selected{% endif %}>
                            {{ matiere.nom }}
                        </option>
                    {% endfor %}
                </select>
                <div class="error-message" id="matiere_error"></div>
            </div>

            <div class="form-actions">
                <a href="{% url 'professeurs' %}" class="btn-cancel">Annuler</a>
                <button type="submit" class="btn-submit">Enregistrer</button>
            </div>

        </form>
    </div>
</main>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

    const inputs = {
        nom: document.getElementById('id_nom'),
        prenom: document.getElementById('id_prenom'),
        email: document.getElementById('id_email'),
        telephone: document.getElementById('id_telephone'),
        matiere: document.getElementById('id_matiere')
    };

    const errors = {
        nom: document.getElementById('nom_error'),
        prenom: document.getElementById('prenom_error'),
        email: document.getElementById('email_error'),
        telephone: document.getElementById('telephone_error'),
        matiere: document.getElementById('matiere_error')
    };

    const regex = {
        alphabetic: /^[A-Za-zÀ-ÿ\s'-]+$/,
        email: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
        phone: /^(?:\+216|00216|216)?[2-9][0-9]{7}$/
    };

    function showError(field, message) {
        inputs[field].classList.add('error');
        errors[field].textContent = message;
        errors[field].classList.add('show');
    }

    function clearError(field) {
        inputs[field].classList.remove('error');
        errors[field].classList.remove('show');
    }

    function validateField(field, value) {

        clearError(field);

        if (!value.trim()) {
            showError(field, "Champ obligatoire");
            return false;
        }

        if ((field === 'nom' || field === 'prenom') && !regex.alphabetic.test(value)) {
            showError(field, "Seulement des lettres autorisées");
            return false;
        }

        if (field === 'email' && !regex.email.test(value)) {
            showError(field, "Email invalide");
            return false;
        }

        if (field === 'telephone' && !regex.phone.test(value)) {
            showError(field, "Téléphone invalide");
            return false;
        }

        if (field === 'matiere' && value === "") {
            showError(field, "Sélection obligatoire");
            return false;
        }

        return true;
    }

    Object.keys(inputs).forEach(field => {
        inputs[field].addEventListener('input', function() {
            validateField(field, this.value);
        });

        inputs[field].addEventListener('blur', function() {
            validateField(field, this.value);
        });
    });

});
</script>

</body>
</html>
